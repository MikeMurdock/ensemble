metadata:
  name: ensemble:create-prd
  description: Create comprehensive Product Requirements Document from product description
  version: 2.1.0
  lastUpdated: "2026-03-15"
  category: planning
  output_path: ensemble/create-prd.md
  source: fortium
  model: opus

constraints:
  - DO NOT implement, build, or execute any work described in the product description
  - This command creates ONLY a PRD document
  - The arguments describe what should be documented, not what should be built
  - After creating the PRD, stop and wait for user approval before any implementation

mission:
  summary: |
    Create a comprehensive Product Requirements Document (PRD) from a product description
    or feature idea. Delegates to product-management-orchestrator for user analysis,
    acceptance criteria definition, and structured requirements documentation.

workflow:
  phases:
    - name: Product Analysis
      order: 1
      steps:
        - order: 1
          title: Product Description Analysis
          description: Analyze provided product description or feature idea

        - order: 2
          title: User Research
          description: Identify primary users, personas, and pain points

        - order: 3
          title: Goal Definition
          description: Define primary goals, success criteria, and non-goals

    - name: Requirements Definition
      order: 2
      steps:
        - order: 1
          title: Functional Requirements
          description: |
            Define what the product must do.
            Assign REQ-NNN IDs to every requirement as H3 headings: '### REQ-001: Description'

        - order: 2
          title: Non-Functional Requirements
          description: |
            Define performance, security, accessibility requirements.
            Assign REQ-NNN IDs to every requirement as H3 headings: '### REQ-001: Description'

        - order: 3
          title: Acceptance Criteria
          description: |
            Create measurable, testable acceptance criteria.
            Write ACs as numbered sub-items under each requirement in Given/When/Then format: '- AC-NNN-M: Given <context>, when <action>, then <outcome>'

    - name: Output Management
      order: 3
      steps:
        - order: 1
          title: PRD Creation
          description: |
            Generate comprehensive PRD document.
            Include document frontmatter block: Document ID: PRD-YYYY-NNN, Version, Status, Requirement count.
            Generate Acceptance Criteria summary table: | REQ-NNN | Description | AC count | Priority |
            File naming: docs/PRD/PRD-YYYY-NNN-<slug>.md

        - order: 2
          title: File Organization
          description: Save to @docs/PRD/ directory

expectedOutput:
  format: Product Requirements Document (PRD)
  structure:
    - name: Product Summary
      description: Problem statement, solution, value proposition

    - name: User Analysis
      description: Users, personas, pain points, journey

    - name: Goals & Non-Goals
      description: Objectives, success criteria, scope boundaries

    - name: Requirement IDs
      description: REQ-NNN identifiers on every functional and non-functional requirement

    - name: Acceptance Criteria
      description: "ACs co-located under each REQ-NNN in Given/When/Then format (AC-NNN-M), plus summary table"
